<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#2D5016"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Buen Fruto — Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--v:#2D5016;--vl:#EBF2E3;--c:#4A1942;--crema:#F7F3EE;--w:#FFFFFF;--negro:#1C1C1E;--g2:#8E8E93;--g3:#C7C7CC;--borde:#E8E2DA;--rojo:#C0392B;--rojol:#FDEDEC}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--negro);color:var(--w);-webkit-font-smoothing:antialiased;overflow:hidden}

.layout{height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{height:60px;background:var(--v);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-brand{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--w)}
.tb-right{font-size:.75rem;color:rgba(255,255,255,.6);text-align:right}
.tb-reloj{font-size:1rem;font-weight:700;color:var(--w);display:block}

/* ÁREA PRINCIPAL */
.main{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:2rem;gap:2rem}

/* BUSCADOR MANUAL */
.scanner-box{
  background:rgba(255,255,255,.05);
  border:2px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:2rem;
  width:100%;max-width:480px;
  text-align:center;
}
.scanner-titulo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:.4rem}
.scanner-sub{font-size:.82rem;color:rgba(255,255,255,.5);margin-bottom:1.5rem}

.input-code{
  width:100%;padding:1rem 1.25rem;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.15);
  border-radius:12px;
  font-family:'Courier New',monospace;
  font-size:1.1rem;font-weight:700;
  color:var(--w);text-align:center;
  letter-spacing:.12em;text-transform:uppercase;
  outline:none;
  transition:border-color .2s;
}
.input-code:focus{border-color:rgba(255,255,255,.4)}
.input-code::placeholder{font-family:'Inter',sans-serif;font-size:.85rem;font-weight:400;letter-spacing:0;color:rgba(255,255,255,.25)}

.btn-scan{
  width:100%;margin-top:1rem;padding:1rem;
  background:var(--v);color:var(--w);
  border:none;border-radius:12px;
  font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:background .15s;
}
.btn-scan:hover{background:#234010}
.btn-scan:active{transform:scale(.98)}

/* RESULTADO */
.resultado{
  width:100%;max-width:480px;
  border-radius:20px;padding:1.75rem;
  text-align:center;
  display:none;
  animation:fadeIn .3s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.resultado.ok{background:rgba(45,80,22,.3);border:2px solid var(--v)}
.resultado.error{background:rgba(192,57,43,.2);border:2px solid var(--rojo)}
.resultado.ya{background:rgba(74,25,66,.2);border:2px solid var(--c)}

.res-icono{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .85rem}
.resultado.ok .res-icono{background:var(--v)}
.resultado.error .res-icono{background:var(--rojo)}
.resultado.ya .res-icono{background:var(--c)}

.res-titulo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;margin-bottom:.3rem}
.res-nombre{font-size:1.1rem;font-weight:700;margin-bottom:.1rem}
.res-detalle{font-size:.82rem;color:rgba(255,255,255,.6)}
.res-pedido{
  margin-top:1rem;background:rgba(255,255,255,.07);
  border-radius:10px;padding:.85rem 1rem;text-align:left;
}
.res-pedido-titulo{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.35rem}
.res-platillo{font-size:.85rem;padding:.2rem 0;color:rgba(255,255,255,.85)}

/* HISTORIAL LATERAL */
.historial{
  position:fixed;right:0;top:60px;bottom:0;
  width:280px;background:rgba(255,255,255,.04);
  border-left:1px solid rgba(255,255,255,.08);
  overflow-y:auto;padding:1rem;
}
.hist-titulo{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.75rem}
.hist-item{
  padding:.65rem .85rem;border-radius:10px;
  background:rgba(255,255,255,.05);margin-bottom:.4rem;
  border-left:3px solid var(--v);
}
.hist-item.error{border-left-color:var(--rojo)}
.hist-nombre{font-size:.82rem;font-weight:600}
.hist-hora{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:.1rem}
</style>
</head>
<body>
<div class="layout">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.6rem">
      <svg viewBox="0 0 44 44" width="22" height="22" fill="none">
        <ellipse cx="19" cy="29" rx="7" ry="9" fill="rgba(255,255,255,.9)"/>
        <ellipse cx="29" cy="30" rx="6" ry="8" fill="rgba(255,255,255,.55)"/>
        <path d="M19 20 Q20 9 27 7 Q25 16 29 22" stroke="rgba(255,255,255,.7)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="tb-brand">Buen Fruto</span>
    </div>
    <div class="tb-right">
      <span class="tb-reloj" id="reloj">--:--</span>
      <span id="fecha-top">Entrada comedor</span>
    </div>
  </div>

  <div class="main" style="margin-right:280px">
    <div class="scanner-box">
      <div class="scanner-titulo">Escanear código</div>
      <div class="scanner-sub">Apunta el lector al barcode del empleado o escríbelo manualmente</div>
      <input type="text" class="input-code" id="inp-code" placeholder="BF-XXXXXXXX-XXXX" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="btn-scan" onclick="escanear()">Validar código</button>
    </div>

    <div class="resultado" id="resultado">
      <div class="res-icono" id="res-icono">
        <svg id="res-svg" viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="res-titulo" id="res-titulo">—</div>
      <div class="res-nombre" id="res-nombre">—</div>
      <div class="res-detalle" id="res-detalle">—</div>
      <div class="res-pedido" id="res-pedido" style="display:none">
        <div class="res-pedido-titulo">Pedido</div>
        <div id="res-platillos"></div>
      </div>
    </div>
  </div>

  <div class="historial">
    <div class="hist-titulo">Últimos escaneos</div>
    <div id="hist-lista"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, query, where, getDocs, updateDoc, doc }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyDFOypq8OfX1QmZpoZAdsXmqKYauswBjes",
  authDomain:"buen-fruto.firebaseapp.com",
  projectId:"buen-fruto",
  messagingSenderId:"931992831636",
  appId:"1:931992831636:web:65ee6652748f6418dc9681"
});
const db = getFirestore(app);

// Reloj
function tick(){
  const d=new Date(),h=d.getHours(),m=d.getMinutes();
  document.getElementById('reloj').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
tick(); setInterval(tick,1000);

// Enter dispara escaneo
document.getElementById('inp-code').addEventListener('keydown',e=>{ if(e.key==='Enter') escanear(); });
document.getElementById('inp-code').focus();

const historial=[];

window.escanear=async function(){
  const code=document.getElementById('inp-code').value.trim().toUpperCase();
  if(!code)return;
  document.getElementById('inp-code').value='';

  // Buscar orden con este barcode para la fecha de hoy
  const q=query(collection(db,'ordenes'),where('barcode','==',code),where('fecha','==',hoy()));
  const snap=await getDocs(q);

  if(snap.empty){
    mostrarRes('error','Código inválido','No se encontró ninguna orden','Verifica que el código sea correcto');
    agregarHistorial('Código inválido','error');
    return;
  }

  const ordenDoc=snap.docs[0];
  const orden=ordenDoc.data();

  if(orden.escaneado){
    mostrarRes('ya','Ya fue escaneado',orden.empleado_nombre||'Empleado','Este código ya fue usado — no puede usarse dos veces');
    agregarHistorial((orden.empleado_nombre||'?')+' (ya escaneado)','error');
    return;
  }

  // Marcar como escaneado → el chef lo recibe en tiempo real
  await updateDoc(doc(db,'ordenes',ordenDoc.id),{
    escaneado: true,
    escaneado_en: new Date()
  });

  // Mostrar éxito
  const pls=(orden.platillos||[]).concat((orden.extras||[]).map(e=>typeof e==='string'?e:e.nombre+' (extra)'));
  mostrarRes('ok','¡Bienvenido!',orden.empleado_nombre||'Empleado',
    orden.hora_preorden ? 'Lista a las '+orden.hora_preorden : 'Pasando a cocina ahora');
  document.getElementById('res-pedido').style.display='block';
  document.getElementById('res-platillos').innerHTML=pls.map(p=>`<div class="res-platillo">• ${p}</div>`).join('');
  agregarHistorial(orden.empleado_nombre||'Empleado','ok');
};

function mostrarRes(tipo,titulo,nombre,detalle){
  const r=document.getElementById('resultado');
  r.className='resultado '+tipo;
  r.style.display='block';
  document.getElementById('res-titulo').textContent=titulo;
  document.getElementById('res-nombre').textContent=nombre;
  document.getElementById('res-detalle').textContent=detalle;
  document.getElementById('res-pedido').style.display='none';
  const svg=document.getElementById('res-svg');
  if(tipo==='ok') svg.innerHTML='<polyline points="20 6 9 17 4 12"/>';
  else if(tipo==='error') svg.innerHTML='<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
  else svg.innerHTML='<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  setTimeout(()=>{ r.style.display='none'; document.getElementById('inp-code').focus(); },tipo==='ok'?4000:3000);
}

function agregarHistorial(nombre,tipo){
  const d=new Date(),h=d.getHours(),m=d.getMinutes();
  historial.unshift({nombre,tipo,hora:(h<10?'0':'')+h+':'+(m<10?'0':'')+m});
  const lista=document.getElementById('hist-lista');
  lista.innerHTML=historial.slice(0,20).map(e=>`
    <div class="hist-item ${e.tipo==='error'?'error':''}">
      <div class="hist-nombre">${e.nombre}</div>
      <div class="hist-hora">${e.hora}</div>
    </div>`).join('');
}

function hoy(){ return new Date().toISOString().slice(0,10); }
</script>
</body>
</html>
