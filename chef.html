<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#2D5016"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Buen Fruto — Cocina</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --v:#2D5016;--v2:#234010;--vl:#EBF2E3;--vl2:#F4F8EE;
  --c:#4A1942;--cl:#F5EFF4;
  --crema:#F7F3EE;--w:#FFFFFF;
  --negro:#1C1C1E;--g1:#48484A;--g2:#8E8E93;--g3:#C7C7CC;
  --borde:#E8E2DA;--borde2:#F0EBE3;
  --naranja:#C65E00;--naranjal:#FFF3E0;
  --shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',system-ui,sans-serif;background:var(--crema);color:var(--negro);-webkit-font-smoothing:antialiased}

/* ── LAYOUT PRINCIPAL ── */
.layout{display:flex;flex-direction:column;height:100vh}

/* ── TOPBAR ── */
.topbar{
  height:64px;background:var(--v);
  padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-left{display:flex;align-items:center;gap:.75rem}
.topbar-logo{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:1.5px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
}
.topbar-brand{
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem;font-weight:700;color:var(--w);
  letter-spacing:-.3px;
}
.topbar-divider{
  width:1px;height:20px;background:rgba(255,255,255,.2);margin:0 .5rem;
}
.topbar-seccion{
  font-size:.8rem;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;color:rgba(255,255,255,.6);
}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-hora{
  font-size:1.1rem;font-weight:700;color:var(--w);
  font-variant-numeric:tabular-nums;letter-spacing:.02em;
}
.topbar-fecha{font-size:.75rem;color:rgba(255,255,255,.55);text-align:right}
.btn-salir{
  padding:.4rem 1rem;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;color:var(--w);
  font-family:'Inter',sans-serif;font-size:.75rem;font-weight:600;
  cursor:pointer;letter-spacing:.03em;
  transition:background .15s;
}
.btn-salir:hover{background:rgba(255,255,255,.2)}

/* ── BARRA DE ESTADO ── */
.statusbar{
  height:48px;
  background:var(--w);
  border-bottom:1px solid var(--borde2);
  padding:0 2rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.status-left{display:flex;align-items:center;gap:1.5rem}
.status-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.verde{background:var(--v)}
.status-dot.gris{background:var(--g3)}
.status-dot.naranja{background:var(--naranja)}
.status-label{color:var(--g2)}
.status-val{font-weight:700;color:var(--negro)}
.status-right{font-size:.75rem;color:var(--g3)}

/* ── GRID PRINCIPAL ── */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1.25rem;
  padding:1.25rem 2rem;
  flex:1;
  overflow-y:auto;
  align-content:start;
}

/* ── ORDEN CARD ── */
.orden-card{
  background:var(--w);border-radius:16px;
  border:2px solid var(--borde2);
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  transition:all .25s;
  overflow:hidden;
}
.orden-card.activa{
  border-color:var(--v);
  box-shadow:0 4px 24px rgba(45,80,22,.18);
  animation:pulse 2.5s ease-in-out infinite;
}
.orden-card.bloqueada{
  opacity:.45;
  filter:grayscale(.3);
}

@keyframes pulse{
  0%,100%{box-shadow:0 4px 24px rgba(45,80,22,.18)}
  50%{box-shadow:0 4px 32px rgba(45,80,22,.35)}
}

/* HEADER CARD */
.card-head{
  background:var(--v);
  padding:.85rem 1.1rem;
  display:flex;align-items:center;justify-content:space-between;
}
.orden-card.bloqueada .card-head{background:var(--g2)}
.card-num-wrap{display:flex;align-items:center;gap:.6rem}
.card-num{
  width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.2);
  color:var(--w);font-size:.82rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.card-empleado{
  font-size:.95rem;font-weight:700;color:var(--w);
}
.card-tiempo{font-size:.7rem;color:rgba(255,255,255,.65);margin-top:.1rem}
.card-badge{
  font-size:.65rem;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;padding:.2rem .6rem;
  border-radius:12px;
}
.card-badge.activa{background:rgba(255,255,255,.2);color:var(--w)}
.card-badge.espera{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}

/* BODY CARD */
.card-body{padding:1rem 1.1rem;flex:1}
.card-sec{
  font-size:.62rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--g3);margin-bottom:.5rem;
}
.platillo{
  display:flex;align-items:center;gap:.55rem;
  padding:.4rem 0;border-bottom:1px solid var(--borde2);
  font-size:.88rem;color:var(--negro);font-weight:500;
}
.platillo:last-child{border-bottom:none}
.platillo-dot{width:6px;height:6px;border-radius:50%;background:var(--v);flex-shrink:0}
.orden-card.bloqueada .platillo-dot{background:var(--g3)}
.extra-tag{
  margin-left:auto;font-size:.65rem;font-weight:700;
  background:var(--naranjal);color:var(--naranja);
  padding:.12rem .45rem;border-radius:5px;flex-shrink:0;
}

/* TIMER BAR */
.timer-bar{
  padding:.55rem 1.1rem;
  background:var(--vl2);
  border-top:1px solid var(--borde2);
  font-size:.75rem;font-weight:600;color:var(--v);
  display:flex;align-items:center;gap:.4rem;
}
.orden-card.bloqueada .timer-bar{background:#F5F5F7;color:var(--g2)}

/* FOOTER CARD */
.card-foot{padding:.9rem 1.1rem;border-top:1px solid var(--borde2)}
.btn-lista{
  width:100%;padding:.85rem;
  background:var(--v);color:var(--w);
  border:none;border-radius:10px;
  font-family:'Inter',sans-serif;
  font-size:.95rem;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  transition:background .15s,transform .1s;
}
.btn-lista:active{background:var(--v2);transform:scale(.98)}
.btn-lista:hover{background:var(--v2)}

/* EMPTY STATE */
.empty-full{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:5rem 2rem;text-align:center;
}
.empty-icon{
  width:80px;height:80px;border-radius:50%;
  background:var(--vl);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:1.5rem;
}
.empty-titulo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.75rem;font-weight:700;color:var(--negro);
  margin-bottom:.5rem;
}
.empty-sub{font-size:.9rem;color:var(--g2);max-width:360px;line-height:1.6}

/* SCANNER INTEGRADO */
.scanner-indicator{
  display:flex;align-items:center;gap:.5rem;
  font-size:.75rem;font-weight:600;
  color:rgba(255,255,255,.7);
}
.scanner-dot{
  width:8px;height:8px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 6px #4ade80;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* OVERLAY ESCANEO */
.scan-overlay{
  position:fixed;inset:0;z-index:400;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
}
.scan-overlay.on{display:flex}
.scan-card{
  background:var(--w);border-radius:24px;
  padding:2.5rem 2rem;width:90%;max-width:480px;
  text-align:center;
  animation:popIn .25s ease;
}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.scan-icono{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.25rem;
}
.scan-icono.ok{background:var(--v)}
.scan-icono.error{background:#C0392B}
.scan-icono.ya{background:var(--c)}
.scan-titulo{
  font-family:'Cormorant Garamond',serif;
  font-size:1.75rem;font-weight:700;margin-bottom:.3rem;
}
.scan-nombre{font-size:1.1rem;font-weight:700;color:var(--negro);margin-bottom:.2rem}
.scan-detalle{font-size:.85rem;color:var(--g2);margin-bottom:1.25rem}
.scan-pedido{
  background:var(--crema);border-radius:12px;
  padding:1rem 1.25rem;text-align:left;margin-bottom:1rem;
}
.scan-pedido-titulo{font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g3);margin-bottom:.5rem}
.scan-platillo{font-size:.9rem;color:var(--negro);padding:.2rem 0;display:flex;align-items:center;gap:.5rem}
.scan-platillo-dot{width:6px;height:6px;border-radius:50%;background:var(--v);flex-shrink:0}
.scan-platillo-dot.extra{background:var(--naranja)}
.scan-hora{
  display:inline-flex;align-items:center;gap:.4rem;
  background:var(--cl);color:var(--c);
  padding:.4rem .85rem;border-radius:20px;
  font-size:.82rem;font-weight:700;margin-top:.5rem;
}
</style>
</head>
<body>
<div class="layout">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg viewBox="0 0 44 44" width="20" height="20" fill="none">
          <ellipse cx="19" cy="29" rx="7" ry="9" fill="rgba(255,255,255,.9)"/>
          <ellipse cx="29" cy="30" rx="6" ry="8" fill="rgba(255,255,255,.55)"/>
          <path d="M19 20 Q20 9 27 7 Q25 16 29 22" stroke="rgba(255,255,255,.7)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="topbar-brand">Buen Fruto</span>
      <div class="topbar-divider"></div>
      <span class="topbar-seccion">Cocina</span>
    </div>
    <div class="topbar-right">
      <div class="scanner-indicator">
        <div class="scanner-dot"></div>
        Listo para escanear
      </div>
      <div style="text-align:right;margin-left:1rem">
        <div class="topbar-hora" id="reloj">--:--</div>
        <div class="topbar-fecha" id="fecha-top">—</div>
      </div>
      <button class="btn-salir" onclick="window.location.href='index.html'">Salir</button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <div class="status-left">
      <div class="status-item">
        <div class="status-dot verde"></div>
        <span class="status-label">Preparando</span>
        <span class="status-val" id="cnt-activa">0</span>
      </div>
      <div class="status-item">
        <div class="status-dot gris"></div>
        <span class="status-label">En espera</span>
        <span class="status-val" id="cnt-espera">0</span>
      </div>
      <div class="status-item">
        <div class="status-dot naranja"></div>
        <span class="status-label">Completadas hoy</span>
        <span class="status-val" id="cnt-listas">0</span>
      </div>
    </div>
    <!-- INDICADOR SCANNER -->
    <div style="display:flex;align-items:center;gap:.6rem;background:rgba(45,80,22,.08);border:1.5px solid var(--v);border-radius:10px;padding:.4rem .85rem">
      <div style="width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:blink 2s ease-in-out infinite"></div>
      <span id="scan-status" style="font-size:.78rem;font-weight:600;color:var(--v)">Listo para escanear</span>
    </div>
  </div>

  <!-- GRID ÓRDENES -->
  <div class="grid" id="grid"></div>

  <!-- DEBUG -->
  <div id="debug-scan" style="display:none;position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:#000;color:#0f0;font-family:monospace;font-size:1.2rem;font-weight:700;padding:1rem 2rem;border-radius:12px;z-index:999;white-space:nowrap"></div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- OVERLAY ESCANEO -->
<div class="scan-overlay" id="scan-overlay">
  <div class="scan-card">
    <div class="scan-icono" id="scan-icono">
      <svg id="scan-svg" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="scan-titulo" id="scan-titulo">—</div>
    <div class="scan-nombre" id="scan-nombre">—</div>
    <div class="scan-detalle" id="scan-detalle">—</div>
    <div class="scan-pedido" id="scan-pedido" style="display:none">
      <div class="scan-pedido-titulo">Pedido</div>
      <div id="scan-platillos"></div>
      <div id="scan-hora-wrap"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="fb-compat.js"></script>
<script>

const DS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function hoy(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

// ── RELOJ ──
function actualizarReloj(){
  const d=new Date(),h=d.getHours(),m=d.getMinutes();
  document.getElementById('reloj').textContent=(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
  document.getElementById('fecha-top').textContent=DS[d.getDay()]+' '+d.getDate()+' de '+MS[d.getMonth()];
}
actualizarReloj();
setInterval(actualizarReloj,1000);

// ── ESTADO ──
let cola = [];
let completadasLista = [];

// ── SCANNER BLUETOOTH — Android Chrome ──
// En Android, el lector BT HID necesita un input enfocado
// readonly evita el teclado táctil pero permite recibir del lector físico
const scanInput = document.createElement('input');
scanInput.type = 'text';
scanInput.readOnly = true;
scanInput.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none';
document.body.appendChild(scanInput);

// Enfocar sin mostrar teclado
function enfocarScanner() {
  scanInput.readOnly = false;
  scanInput.focus();
  scanInput.readOnly = true;
}
enfocarScanner();
setInterval(enfocarScanner, 1500);

let scanBuffer = '';
let scanTimer = null;

function procesarBuffer() {
  let code = scanBuffer.toUpperCase().trim();
  // Fix COM-598: duplica cada carácter (EEMMPP8888 → EMP88)
  let dedup = '';
  for (let i = 0; i < code.length; i += 2) {
    dedup += code[i];
  }
  scanBuffer = '';
  document.getElementById('scan-status').textContent = dedup || 'Listo para escanear';
  setTimeout(() => {
    document.getElementById('scan-status').textContent = 'Listo para escanear';
  }, 3000);
  if (dedup.length > 3) procesarScan(dedup);
}

document.addEventListener('keypress', e => {
  if (e.key === 'Enter') { clearTimeout(scanTimer); procesarBuffer(); return; }
  scanBuffer += e.key;
  // Mostrar deduplicado en tiempo real
  let preview = '';
  const raw = scanBuffer.toUpperCase();
  for (let i = 0; i < raw.length; i += 2) preview += raw[i];
  document.getElementById('scan-status').textContent = preview || 'Listo para escanear';
  clearTimeout(scanTimer);
  scanTimer = setTimeout(procesarBuffer, 800);
});

scanInput.addEventListener('keypress', e => {
  if (e.key === 'Enter') { clearTimeout(scanTimer); procesarBuffer(); return; }
  scanBuffer += e.key;
  let preview = '';
  const raw = scanBuffer.toUpperCase();
  for (let i = 0; i < raw.length; i += 2) preview += raw[i];
  document.getElementById('scan-status').textContent = preview || 'Listo para escanear';
  clearTimeout(scanTimer);
  scanTimer = setTimeout(procesarBuffer, 800);
});

scanInput.addEventListener('input', () => {
  const val = scanInput.value;
  scanInput.value = '';
  if (val) {
    scanBuffer += val;
    let preview = '';
    const raw = scanBuffer.toUpperCase();
    for (let i = 0; i < raw.length; i += 2) preview += raw[i];
    document.getElementById('scan-status').textContent = preview || 'Listo para escanear';
    clearTimeout(scanTimer);
    scanTimer = setTimeout(procesarBuffer, 800);
  }
});

async function procesarScan(code) {
  document.getElementById('debug-scan').textContent = 'Código: ' + code;
  document.getElementById('debug-scan').style.display = 'block';

  // Buscar empleado por código de gafete — API compat directa
  const empSnap = await db.collection('empleados').where('codigo_gafete','==',code).get();

  if (empSnap.empty) {
    mostrarScanOverlay('error','Gafete inválido','','No se encontró ningún empleado con este código');
    return;
  }

  const empDoc = empSnap.docs[0];
  const emp = empDoc.data();

  // Buscar órdenes del empleado y filtrar por fecha local
  const ordSnap = await db.collection('ordenes').where('empleado_uid','==',empDoc.id).get();
  const ordenes = [];
  const fechaHoy = hoy();
  ordSnap.forEach(d => {
    const data = d.data();
    if (data.fecha === fechaHoy && data.estado !== 'cancelado') ordenes.push({id:d.id,...data});
  });

  if (!ordenes.length) {
    mostrarScanOverlay('error','Sin orden hoy', emp.nombre,'Este empleado no tiene ninguna orden para hoy');
    return;
  }

  const orden = ordenes[0];

  if (orden.escaneado) {
    mostrarScanOverlay('ya','Ya escaneado', emp.nombre,'Este empleado ya pasó por el comedor hoy');
    return;
  }

  await db.collection('ordenes').doc(orden.id).update({ escaneado:true, escaneado_en:new Date() });

  mostrarScanOverlay(
    'ok','¡Bienvenido!', emp.nombre,
    orden.hora_preorden ? 'Tu comida está siendo preparada para las '+orden.hora_preorden : 'Pasando a cocina ahora',
    orden.platillos||[], orden.extras||[], orden.hora_preorden||null
  );
}

function mostrarScanOverlay(tipo, titulo, nombre, detalle, platillos=[], extras=[], hora=null) {
  const overlay = document.getElementById('scan-overlay');
  const icono   = document.getElementById('scan-icono');
  const svg     = document.getElementById('scan-svg');
  document.getElementById('scan-titulo').textContent  = titulo;
  document.getElementById('scan-nombre').textContent  = nombre;
  document.getElementById('scan-detalle').textContent = detalle;

  icono.className = 'scan-icono ' + tipo;
  if (tipo === 'ok') {
    svg.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
  } else if (tipo === 'error') {
    svg.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
  } else {
    svg.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
  }

  const pedidoWrap = document.getElementById('scan-pedido');
  if (tipo === 'ok' && (platillos.length || extras.length)) {
    pedidoWrap.style.display = 'block';
    document.getElementById('scan-platillos').innerHTML =
      platillos.map(p => `<div class="scan-platillo"><div class="scan-platillo-dot"></div>${p}</div>`).join('') +
      (extras||[]).map(e => `<div class="scan-platillo"><div class="scan-platillo-dot extra"></div>${typeof e==='string'?e:(e.nombre+' (+$'+e.precio+')')}</div>`).join('');
    const horaWrap = document.getElementById('scan-hora-wrap');
    horaWrap.innerHTML = hora ? `<div class="scan-hora"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Lista a las ${hora}</div>` : '';
  } else {
    pedidoWrap.style.display = 'none';
  }

  overlay.classList.add('on');
  // Cerrar automáticamente
  clearTimeout(overlay._t);
  overlay._t = setTimeout(() => {
    overlay.classList.remove('on');
    mantenerFoco();
  }, tipo === 'ok' ? 4000 : 2500);
}

// Cerrar overlay al tocar
document.getElementById('scan-overlay').addEventListener('click', () => {
  document.getElementById('scan-overlay').classList.remove('on');
  mantenerFoco();
});

// ── LISTENER FIRESTORE EN TIEMPO REAL ──
function suscribirOrdenes() {
  const q = db.collection('ordenes').where('fecha', '==', hoy());
  q.onSnapshot(snap => {
    const todasHoy = [];
    snap.forEach(d => todasHoy.push({ id: d.id, ...d.data() }));
    todasHoy.sort((a,b) => (a.creado_en?.toMillis?.()||0) - (b.creado_en?.toMillis?.()||0));

    const totalPreordenes = todasHoy.filter(o => o.hora_preorden && o.estado !== 'lista' && o.estado !== 'cancelado').length;

    const nuevasCola = todasHoy.filter(o => {
      if (o.estado === 'lista' || o.estado === 'cancelado') return false;
      if (!o.hora_preorden) return o.escaneado;
      return horaAlcanzada(o.hora_preorden, totalPreordenes);
    });

    // Detectar órdenes nuevas para toast
    nuevasCola.forEach(o => {
      if (!cola.find(x => x.id === o.id) && !completadasLista.find(x => x.id === o.id)) {
        toast((o.hora_preorden ? '⏰ Pre-orden' : '🔔 Nueva orden') + ' — ' + (o.empleado_nombre||'').split(' ')[0]);
      }
    });

    // Actualizar completadas
    todasHoy.filter(o => o.estado === 'lista').forEach(o => {
      if (!completadasLista.find(x => x.id === o.id)) {
        completadasLista.push({ ...o, tsLista: o.lista_en?.toDate?.()?.getTime() || Date.now() });
      }
    });

    cola = nuevasCola;
    render();
  });
}

function horaEnMin(horaStr) {
  if (!horaStr) return 9999;
  const p = horaStr.replace(' pm','').replace(' am','').split(':');
  let h = parseInt(p[0]), m = parseInt(p[1]||0);
  if (horaStr.includes('pm') && h !== 12) h += 12;
  return h * 60 + m;
}

// Verificar si la hora de pre-orden ya llegó con anticipación dinámica
function horaAlcanzada(horaStr, totalPreordenes) {
  if (!horaStr) return false;
  const p = horaStr.replace(' pm','').replace(' am','').split(':');
  let h = parseInt(p[0]), m = parseInt(p[1]||0);
  if (horaStr.includes('pm') && h !== 12) h += 12;
  const ahora = new Date();
  const obj = new Date(ahora.getFullYear(), ahora.getMonth(), ahora.getDate(), h, m, 0);
  // 1-5 → 10 min, 6-10 → 15 min, 11-15 → 20 min, etc.
  const anticipacion = 10 + (Math.floor((totalPreordenes - 1) / 5) * 5);
  const objConAnticipacion = new Date(obj.getTime() - anticipacion * 60000);
  return ahora >= objConAnticipacion;
}

// ── MARCAR LISTA ──
async function marcarLista(id) {
  await updateDoc(doc(db, 'ordenes', id), { estado: 'lista', lista_en: new Date() });
  const idx = cola.findIndex(o => o.id === id);
  if (idx !== -1) {
    const o = { ...cola[idx], tsLista: Date.now() };
    completadasLista.push(o);
    toast('✓ Lista — ' + (o.empleado_nombre||'').split(' ')[0]);
  }
}

async function cancelarOrden(id) {
  await updateDoc(doc(db, 'ordenes', id), {
    estado: 'cancelado',
    escaneado: false,
    cancelado_en: new Date()
  });
  toast('Orden cancelada');
}

function fmtHoraTs(ts) {
  const d = ts?.toDate ? ts.toDate() : new Date(ts);
  return (d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
}
function fmtEspera(ts) {
  const d = ts?.toDate ? ts.toDate() : new Date(ts);
  const min = Math.floor((Date.now()-d)/60000);
  if(min===0)return'Ahora mismo';
  if(min===1)return'Hace 1 min';
  return'Hace '+min+' min';
}
function cuentaRegresiva(horaStr){
  if(!horaStr)return null;
  const p=horaStr.replace(' pm','').replace(' am','').split(':');
  let h=parseInt(p[0]),m=parseInt(p[1]||0);
  if(horaStr.includes('pm')&&h!==12)h+=12;
  const ahora=new Date(),obj=new Date(ahora.getFullYear(),ahora.getMonth(),ahora.getDate(),h,m,0);
  const diff=Math.floor((obj-ahora)/60000);
  if(diff<0)return'Ya pasó la hora';
  if(diff===0)return'¡Ahora!';
  if(diff<60)return'Faltan '+diff+' min';
  return'Faltan '+Math.floor(diff/60)+'h '+(diff%60)+'min';
}

// ── RENDER ──
function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  // Separar y ordenar
  const preords  = cola.filter(o => !!o.hora_preorden)
                       .sort((a,b) => horaEnMin(a.hora_preorden) - horaEnMin(b.hora_preorden));
  const normales = cola.filter(o => !o.hora_preorden);

  document.getElementById('cnt-activa').textContent  = normales.length > 0 ? '1' : preords.length > 0 ? '1' : '0';
  document.getElementById('cnt-espera').textContent  = Math.max(0, normales.length-1) + preords.length;
  document.getElementById('cnt-listas').textContent  = completadasLista.length;

  if (cola.length === 0 && completadasLista.length === 0) {
    const e = document.createElement('div'); e.className = 'empty-full';
    e.innerHTML = '<div class="empty-icon"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="#2D5016" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><div class="empty-titulo">Todo en orden</div><div class="empty-sub">Las órdenes aparecerán cuando los empleados escaneen su gafete</div>';
    grid.appendChild(e); return;
  }

  // Primero pre-órdenes (por hora), luego normales (FIFO)
  const ordenFinal = [...preords, ...normales];

  ordenFinal.forEach((o, i) => {
    const esPreorden = !!o.hora_preorden;
    // La primera normal es la activa — pre-órdenes siempre activas
    const esActiva = esPreorden || (!esPreorden && normales[0]?.id === o.id);
    const bloqueada = !esPreorden && !esActiva;

    const card = document.createElement('div');
    card.className = 'orden-card' + (esActiva && !bloqueada ? (esPreorden ? '' : ' activa') : (bloqueada ? ' bloqueada' : ''));
    if (esPreorden) card.style.cssText += 'border:2px solid var(--c)!important;animation:none!important;opacity:1!important;pointer-events:auto!important;filter:none!important;box-shadow:0 4px 20px rgba(74,25,66,.15)!important';

    const headBg = esPreorden ? 'var(--c)' : 'var(--v)';
    const badge = esPreorden
      ? '<span class="card-badge" style="background:rgba(255,255,255,.2);color:white">⏰ Pre-orden</span>'
      : esActiva
        ? '<span class="card-badge activa">Preparando</span>'
        : '<span class="card-badge espera">#'+(normales.indexOf(o)+1)+' en cola</span>';

    const tiempoTxt = esPreorden ? 'Lista para las '+o.hora_preorden : (esActiva ? 'Preparando ahora' : 'En espera');
    const plHTML = (o.platillos||[]).map(p => '<div class="platillo"><div class="platillo-dot"></div>'+p+'</div>').join('');
    let exHTML = '';
    if ((o.extras||[]).length) {
      exHTML = '<div style="margin-top:.5rem;background:var(--naranjal);border-radius:8px;padding:.5rem .75rem"><div class="card-sec" style="color:var(--naranja);margin-bottom:.35rem">Extras adicionales</div>'
        + o.extras.map(e => '<div class="platillo" style="border-color:rgba(198,94,0,.15)"><div class="platillo-dot" style="background:var(--naranja)"></div><span style="color:var(--naranja);font-weight:600">'+(e.nombre||e)+'</span></div>').join('')
        + '</div>';
    }

    let timerHTML = '';
    if (esPreorden) {
      const cr = cuentaRegresiva(o.hora_preorden);
      const urg = cr && cr.includes('Faltan') && parseInt(cr.replace(/[^0-9]/g,'')) < 15;
      timerHTML = '<div class="timer-bar" style="background:'+(urg?'var(--naranjal)':'var(--cl)')+';color:'+(urg?'var(--naranja)':'var(--c)')+'"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Lista para las <strong>'+o.hora_preorden+'</strong> &nbsp;·&nbsp; '+cr+'</div>';
    } else {
      timerHTML = '<div class="timer-bar"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Llegó '+fmtEspera(o.creado_en)+'</div>';
    }

    // Botón: activa normal + todas las pre-órdenes
    const footHTML = (!bloqueada)
      ? '<div class="card-foot"><button class="btn-lista" data-id="'+o.id+'" style="background:'+(esPreorden?'var(--c)':'var(--v)')+'"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Marcar como lista</button></div>'
      : '';

    card.innerHTML =
      '<div class="card-head" style="background:'+headBg+'">'
        +'<div class="card-num-wrap"><div class="card-num">'+(i+1)+'</div>'
        +'<div><div class="card-empleado">'+(o.empleado_nombre||'—').split(' ').slice(0,2).join(' ')+'</div>'
        +'<div class="card-tiempo">'+tiempoTxt+'</div></div></div>'+badge
      +'</div>'
      +'<div class="card-body">'
        +'<div style="background:var(--vl2);border-radius:8px;padding:.5rem .75rem;margin-bottom:.25rem">'
        +'<div class="card-sec" style="color:var(--v);margin-bottom:.35rem">Buffet del día</div>'+plHTML
        +'</div>'+exHTML
      +'</div>'+timerHTML+footHTML;

    grid.appendChild(card);
  });

  // Listeners
  grid.querySelectorAll('.btn-lista').forEach(btn => {
    btn.addEventListener('click', () => marcarLista(btn.dataset.id));
  });
  grid.querySelectorAll('.btn-cancelar').forEach(btn => {
    btn.addEventListener('click', () => cancelarOrden(btn.dataset.id));
  });

  // Historial completadas
  if (completadasLista.length > 0) {
    const sep = document.createElement('div');
    sep.style.cssText = 'grid-column:1/-1;display:flex;align-items:center;gap:.75rem;margin-top:.5rem';
    sep.innerHTML = '<div style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g3);white-space:nowrap">Completadas hoy ('+completadasLista.length+')</div><div style="flex:1;height:1px;background:var(--borde)"></div>';
    grid.appendChild(sep);

    const hw = document.createElement('div');
    hw.style.cssText = 'grid-column:1/-1;display:flex;flex-wrap:wrap;gap:.5rem';
    completadasLista.slice().reverse().forEach(o => {
      const chip = document.createElement('div');
      chip.style.cssText = 'background:var(--w);border:1px solid var(--borde2);border-left:3px solid '+(o.hora_preorden?'var(--c)':'var(--v)')+';border-radius:10px;overflow:hidden;cursor:pointer;transition:box-shadow .15s';
      const plHTML2 = (o.platillos||[]).map(p=>'<div style="display:flex;align-items:center;gap:.4rem;padding:.2rem 0;font-size:.78rem;color:var(--g1)"><div style="width:5px;height:5px;border-radius:50%;background:var(--v);flex-shrink:0"></div>'+p+'</div>').join('');
      const exHTML2 = (o.extras||[]).length ? (o.extras||[]).map(e=>'<div style="display:flex;align-items:center;gap:.4rem;padding:.2rem 0;font-size:.78rem;color:var(--naranja);font-weight:600"><div style="width:5px;height:5px;border-radius:50%;background:var(--naranja);flex-shrink:0"></div>'+(e.nombre||e)+'</div>').join('') : '';
      chip.innerHTML =
        '<div class="chip-head" style="display:flex;align-items:center;gap:.5rem;padding:.55rem .85rem;font-size:.8rem">'
          +'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="'+(o.hora_preorden?'var(--c)':'var(--v)')+'" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
          +'<span style="font-weight:700;color:var(--negro)">'+(o.empleado_nombre||'—').split(' ').slice(0,2).join(' ')+'</span>'
          +'<span style="color:var(--g3)">'+fmtHoraTs(o.tsLista)+'</span>'
          +(o.hora_preorden?'<span style="font-size:.65rem;background:var(--cl);color:var(--c);padding:.1rem .4rem;border-radius:5px;font-weight:700">Pre-orden</span>':'')
          +'<svg class="chip-arrow" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="var(--g3)" stroke-width="2" stroke-linecap="round" style="margin-left:auto;transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>'
        +'</div>'
        +'<div class="chip-detalle" style="display:none;padding:.5rem .85rem .75rem;border-top:1px solid var(--borde2)">'
          +'<div style="margin-bottom:.25rem">'+plHTML2+'</div>'
          +(exHTML2?'<div style="border-top:1px solid var(--borde2);padding-top:.35rem;margin-top:.35rem">'+exHTML2+'</div>':'')
        +'</div>';
      chip.addEventListener('click', () => {
        const det = chip.querySelector('.chip-detalle');
        const arrow = chip.querySelector('.chip-arrow');
        const abierto = det.style.display === 'block';
        det.style.display = abierto ? 'none' : 'block';
        arrow.style.transform = abierto ? '' : 'rotate(180deg)';
        chip.style.boxShadow = abierto ? '' : '0 2px 12px rgba(0,0,0,.08)';
      });
      hw.appendChild(chip);
    });
    grid.appendChild(hw);
  }
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('on'),2500);
}

setInterval(()=>{ if(cola.length) render(); }, 30000);
// Revisar cada minuto si alguna pre-orden llegó a su hora
setInterval(()=> { if(cola.length || true) suscribirOrdenes(); }, 60000);

// Autenticar anónimamente para acceder a Firestore
// Iniciar órdenes directamente — las reglas permiten auth anónima
auth.signInAnonymously().finally(() => suscribirOrdenes());
suscribirOrdenes(); // también iniciar de inmediato sin esperar


</script>
